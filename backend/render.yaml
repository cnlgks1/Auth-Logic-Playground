services:
  # Backend Service (NestJS via Docker + SQLite)
  - type: web
    name: oauth-backend
    env: docker
    rootDir: backend
    plan: free
    # Run migrations on the persistent DB before starting
    startCommand: npx prisma migrate deploy && pnpm start:prod
    envVars:
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://auth-logic-playground.vercel.app
      - key: NODE_ENV
        value: production
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
