services:
  # Backend Service (NestJS)
  - type: web
    name: oauth-backend
    env: node
    root: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: oauth-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: oauth-frontend
          property: url

  # Frontend Service (Next.js)
  - type: web
    name: oauth-frontend
    env: node
    root: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: oauth-backend
          property: url

databases:
  - name: oauth-db
    plan: free
    databaseName: oauth
    user: oauth_user
