services:
  # Backend Service (NestJS)
  - type: web
    name: oauth-backend
    env: node
    rootDir: backend
    plan: free
    # Install dev dependencies to get Nest CLI, then build
    # Build Command:
    # 1. Install dependencies
    # 2. (Critical) Swap SQLite config to PostgreSQL config for production
    # 3. Generate Prisma client
    # 4. Build NestJS
    buildCommand: |
      npm install --include=dev
      sed -i 's/provider = "sqlite"/provider = "postgresql"/g' prisma/schema.prisma
      sed -i 's/url      = "file:.\/dev.db"/url      = env("DATABASE_URL")/g' prisma/schema.prisma
      npx prisma generate
      npm run build
    
    # Start Command
    startCommand: npx prisma db push && npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false # Neon URL을 Render 대시보드에서 직접 입력하세요
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://auth-logic-playground.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
